<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mừng Ngày Quốc Tế Phụ Nữ 8/3 💐</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="stars-canvas"></canvas>
    <div id="petals-container"></div>

    <button id="music-btn" title="Bật/tắt nhạc">🎵</button>
    <audio id="bgMusic" loop>
      <source
        src="https://www.bensound.com/bensound-music/bensound-love.mp3"
        type="audio/mpeg"
      />
    </audio>

    <div class="container">
      <!-- Gift Section -->
      <div id="gift-section" class="gift-section">
        <div class="gift-float">
          <div class="gift-box">
            <div class="gift-body">
              <div class="ribbon ribbon-v"></div>
              <div class="ribbon ribbon-h"></div>
              <div class="shine"></div>
            </div>
            <div class="bow"><div class="bow-knot"></div></div>
          </div>
          <div class="gift-glow"></div>
        </div>
        <p class="click-hint">✨ Chạm vào món quà dành cho bạn ✨</p>
      </div>

      <!-- Card Section -->
      <div id="card-section" class="card">
        <div class="card-date">8 / 3</div>
        <h1 class="card-title">Happy Women's Day!</h1>

        <!-- Category Tabs -->
        <div class="category-tabs">
          <button class="cat-btn active" data-cat="friend">👭 Bạn bè</button>
          <button class="cat-btn" data-cat="colleague">💼 Đồng nghiệp</button>
          <button class="cat-btn" data-cat="family">❤️ Người thân</button>
        </div>

        <!-- Message Display -->
        <div class="message-display" id="message-display">
          <span class="msg-icon" id="msg-icon"></span>
          <p id="msg-text"></p>
          <p class="swipe-tip">← vuốt để đổi câu →</p>
        </div>

        <!-- Shuffle Button -->
        <button class="shuffle-btn" id="shuffle-btn">✨ Câu chúc khác</button>

        <div class="card-footer">
          <div class="roses">🌹 🌷 🌸 💖 🌸 🌷 🌹</div>
          <p class="sig">Luôn yêu thương bạn 💕</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
