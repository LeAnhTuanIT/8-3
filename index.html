<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mừng Ngày Quốc Tế Phụ Nữ 8/3</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="bgMusic" loop>
      <source
        src="https://www.bensound.com/bensound-music/bensound-love.mp3"
        type="audio/mpeg"
      />
    </audio>

    <div id="flower-container"></div>

    <div class="container">
      <div id="gift-section" class="gift-container">
        <div class="gift-box">
          <div class="ribbon-v"></div>
          <div class="ribbon-h"></div>
        </div>
        <p class="click-text">Chạm vào món quà dành cho bạn ✨</p>
      </div>

      <div id="card-section" class="card">
        <h1>Happy Women's Day!</h1>
        <p>
          Chúc <strong>người phụ nữ tuyệt vời</strong> một ngày 8/3 thật rực rỡ,
          hạnh phúc và luôn tràn đầy yêu thương.
        </p>
        <div class="rose-icon">🌹🌷🌸</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
